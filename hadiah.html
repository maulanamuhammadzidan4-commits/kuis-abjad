<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadiah</title>
    <style>
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #FFFEE8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 15px; /* Mencegah card menyentuh tepi layar HP */
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        .card {
            background: white;
            padding: 40px 20px;
            border-radius: 40px;
            border: 6px solid #2b2d42;
            box-shadow: 0 15px 0 #E6E5CE;
        }
        h2 { color: #FF4757; font-size: 2.5rem; margin-bottom: 20px; }
        .hasil { font-size: 1.5rem; color: #2b2d42; }
        #nilai { color: #1E90FF; font-size: 2rem; }
        #hadiah { color: #2ED573; font-size: 2rem; display: block; margin-top: 15px; font-weight: bold; }
        button{
            margin-top: 25px;
            padding: 10px 20px;
            font-size: 1.2rem;
            color: white;
            background-color: #FF4757;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #FF6B81;
        }
        .alert{
            display: none;
            text-align: center;
            width: 100%;
            max-width: 450px;
        }

        /* --- MEDIA QUERY FOR MOBILE HP --- */
        @media screen and (max-width: 480px) {
            .card {
                padding: 30px 15px;
                border-radius: 25px;
                border-width: 4px;
                box-shadow: 0 10px 0 #E6E5CE;
            }
            h2 {
                font-size: 1.8rem;
                margin-bottom: 15px;
            }
            .hasil {
                font-size: 1.2rem;
            }
            #nilai {
                font-size: 1.5rem;
            }
            #hadiah {
                font-size: 1.5rem;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Ini adalah hadiahmu!</h2>
            <p class="hasil">Karena nilaimu adalah <b id="knilai"></b> + <b id="bnilai"></b> + <b id="suku-kata"></b> = <b id="tnilai"></b>. Jadi hadiahmu adalah <span id="hadiah"></span></p>
            <button onclick="pulang()">Kembali</button>
        </div>
    </div>

    <div class="alert">
        <div class="card">
            <h2>Hadiah?</h2>
            <p class="hasil">Data nilai <span id="galat"></span> masih kosong. Jadi, isi dulu ya.</p>
            <button onclick="isi()">Isi</button>
        </div>
    </div>

    <script>
        // variabel buat memilih elemen dan ngambil nilai
        const nilaiK = Number(localStorage.getItem('kNilaiSimpan'));
        const nilaiB = Number(localStorage.getItem('bNilaiSimpan'));
        const nilaiSukuKata = Number(localStorage.getItem('nilaiSukuKata'));
        const knilai = document.getElementById('knilai');
        const bnilai = document.getElementById('bnilai');
        const sukuKata = document.getElementById('suku-kata');
        const tnilai = document.getElementById('tnilai');
        const hadiah = document.getElementById('hadiah');
        const galat = document.getElementById('galat');
        console.log(`${nilaiK} ${nilaiB} ${nilaiSukuKata}`);

        // logika pemilihan hadiah
        const totalNilai = nilaiK + nilaiB + nilaiSukuKata;
        const tipeHadiah = (totalNilai > 200) ? 'Gacor' : (totalNilai == 200) ? 'Lorem ipsum' : (totalNilai > 100) ? 'lorem' : (totalNilai <= 100) ? 'ipsum' : 'Tidak ada hadiah untukmu.';

        // output hadiah
        const penentu = (nilaiK == 0 && nilaiB == 0 && nilaiSukuKata == 0) ? 'z' : (nilaiK == 0 && nilaiB == 0 || nilaiB == 0 && nilaiSukuKata == 0 || nilaiK == 0 && nilaiSukuKata == 0) ? 'p' : (nilaiK == 0) ? 'b' : (nilaiB == 0) ? 'd' : (nilaiSukuKata == 0) ? 'g' : 'f';
        console.log(penentu);
        function isi(){
            if (penentu == 'b'){
                window.location.href = 'kapital/index.html';
            } else if (penentu == 'd'){
                window.location.href = 'biasa/index.html';
            } else if (penentu == 'g'){
                window.location.href = 'suku-kata/index.html'
            } else if (penentu == 'z' || penentu == 'p'){
                window.location.href = 'index.html';
            }
        }
        if (penentu == 'z'){
            document.querySelector('.alert').innerHTML = `
            <div class="card">
                <h2>Hadiah?</h2>
                <p class="hasil">Semua nilai masih kosong. Isi dulu ya!</p>
                <button onclick="isi()">Isi</button>
            </div>
            `;
            document.querySelector('.container').style.display = 'none';
            document.querySelector('.alert').style.display = 'flex';
        } else if (penentu == 'b'){
            galat.innerText = 'Kapital';
            document.querySelector('.container').style.display = 'none';
            document.querySelector('.alert').style.display = 'flex';
        } else if (penentu == 'd'){
            galat.innerText = 'Biasa';
            document.querySelector('.container').style.display = 'none';
            document.querySelector('.alert').style.display = 'flex';
        } else if (penentu == 'g'){
            galat.innerText = 'Suku Kata';
            document.querySelector('.container').style.display = 'none';
            document.querySelector('.alert').style.display = 'flex';
        } else if (penentu == 'p'){
            let kosong1 = (nilaiK == 0 && nilaiB == 0) ? 'Kapital' : (nilaiB == 0 && nilaiSukuKata == 0) ? 'Biasa' : (nilaiK == 0 && nilaiSukuKata == 0) ? 'Suku Kata' : '';
            let kosong2 = (nilaiK == 0 && nilaiB == 0) ? 'Biasa' : (nilaiB == 0 && nilaiSukuKata == 0) ? 'Suku Kata' : (nilaiK == 0 && nilaiSukuKata == 0) ? 'Kapital' : '';
            galat.innerText = `${kosong1} dan ${kosong2}`;
            document.querySelector('.container').style.display = 'none';
            document.querySelector('.alert').style.display = 'flex';
        } else if (penentu == 'f'){
            knilai.innerText = nilaiK;
            bnilai.innerText = nilaiB;
            sukuKata.innerText = nilaiSukuKata;
            tnilai.innerText = totalNilai;
            hadiah.innerText = tipeHadiah;
        }
        function pulang(){
            window.location.href = 'index.html';
            localStorage.removeItem('kNilaiSimpan');
            localStorage.removeItem('bNilaiSimpan');
            localStorage.removeItem('nilaiSukuKata');
        }
    </script>
</body>
</html>
